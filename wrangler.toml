# ═══════════════════════════════════════════════════════════
# TrainKit — Cloudflare Pages Configuration
# ═══════════════════════════════════════════════════════════

name = "trainkit"
compatibility_date = "2024-09-25"
pages_build_output_dir = "public"

# ─── KV Namespace for rate caching ───
# Create in Cloudflare dashboard: Workers & Pages > KV > Create namespace
# Then add the binding ID here:
#
# [[kv_namespaces]]
# binding = "TRAINKIT_KV"
# id = "your-kv-namespace-id-here"

# ─── Environment Variables ───
# Set in Cloudflare Pages dashboard > Settings > Environment variables:
#   EXCHANGE_API_KEY = your-exchangerate-api-key
#
# Get a free key at: https://app.exchangerate-api.com/
# Free tier: 1,500 requests/month (plenty with 30-min caching)
